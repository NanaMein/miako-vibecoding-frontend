services:
  react-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: master-nana-frontend
    ports:
      - "3000:80"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nana-network

networks:
  nana-network:
    driver: bridge
